block;\"\u003e\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week06.md":"# Week 6 â€“ Text \u0026 Distant Reading\r\n\r\n## The Artifact\r\n\u003ciframe src=\"https://www.google.com/maps/d/embed?mid=1ZXVOHVmqaFxqGNhFM_rCiBzE4_fkNIA\" width=\"940\" height=\"600\" frameborder=\"0\" title=\"Digital Map of ChatGPT and Gemini global infrastructures\"\u003e\u003c/iframe\u003e\r\n\r\n![Digital Map of ChatGPT \u0026 Geminiâ€™s global infrastructures, including locations for corporate headquarters, development, data centers, mining sites, and content moderation \u0026 data labeling.](https://www.google.com/maps/d/embed?mid=1ZXVOHVmqaFxqGNhFM_rCiBzE4_fkNIA)\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week07.md":"# Week 7 â€“ Mapping AI Worlds\r\n\r\n## The Artifact\r\n\u003ciframe src=\"https://embed.kumu.io/2b700062e2f87f2d37217b4dd312e0d0\" width=\"940\" height=\"600\" frameborder=\"0\" title=\"Academic Citation Network for AI Military Regulation Debate\"\u003e\u003c/iframe\u003e\r\n\r\n![Academic Citation Network for AI Military Regulation Debate](https://embed.kumu.io/2b700062e2f87f2d37217b4dd312e0d0)\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week08.md":"# Week 8 â€“ Networks of Knowledge \u0026 Power\r\n\r\n## The Artifact\r\nDescribe or embed your artifact here.\r\nInclude images, links, or media as appropriate.\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week09.md":"# Make 8. Build a bot or generator using a no-code AI tool\r\n\r\n## The Artifact\r\n\u003ciframe src=\"assets/pdfs/week09-make8-bot-generator.pdf\" width=\"940\" height=\"600\" frameborder=\"0\" title=\"Week 9 PDF submission: Build a bot or generator using a no-code AI tool\"\u003e\u003c/iframe\u003e\r\n\r\n[Open the Week 9 PDF in a new tab](assets/pdfs/week09-make8-bot-generator.pdf)\r\n\r\n## Process Notes\r\nFor this make, I used Suno AI in Advanced mode to generate tracks and control both style and lyrics. I selected a high-intensity style direction and then iterated on lyrics through repeated prompt cycles.\r\n\r\nThe style input emphasized fast, aggressive electronic music with a dark cinematic tone, including descriptors like speedcore, Frenchcore, military extraction atmosphere, metallic textures, and radio-filtered distortion.\r\n\r\nI wrote the initial radio-call section myself and then remixed and expanded lyrics with Suno\u0027s \"Write Full Song\" tool. I introduced Frankenstein-inspired language and quotes (for example: \"Beware; for I am fearless, and therefore powerful\") and repeatedly regenerated outputs until the tracks fit the concept.\r\n\r\nIn total, I generated 12 tracks from 6 lyric prompts (Suno returns two tracks per generation).\r\n\r\n## PDF Content (Extracted)\r\nKey ideas from the submitted PDF:\r\n\r\n- Creativity in AI generation appears in curation: deciding what to keep, edit, or reject.\r\n- The project uses a human-defined genre direction (hardcore/industrial electronic) rather than default model choices.\r\n- Human authorship appears in lyric writing and iterative editing of AI-generated text.\r\n- Selection criteria were explicit: required custom words, acceptable vocal rhythm/naturalness, and an acceptable beat.\r\n- The write-up frames generation as a loop where AI and user biases interact until the user decides to stop.\r\n\r\n## Reflection\r\nThis make made me think about creativity less as \"making from scratch\" and more as directing, filtering, and deciding. Suno could generate endless variations, but most outputs did not satisfy what I was trying to express. The creative labor came from setting constraints, rewriting prompts, and being willing to discard results that were close but wrong. In that sense, the tool was productive, but not autonomous.\r\n\r\nI also noticed that intention was carried most strongly in the parts I authored directly: genre direction, key vocabulary, and lyric edits. Even when the model produced fluent lines, they needed framing and revision to match the concept. The Frankenstein references helped me capture the project\u0027s central tension: creating something that feels powerful, strange, and partially outside my control.\r\n\r\nThis process changed how I define authorship in generative work. I do not see authorship as binary (human or AI), but as layered across prompting, selecting, revising, and sequencing. The final artifact is not just the model\u0027s output; it is the record of choices made under abundance. If AI can generate infinitely, then human creativity may lie in taste, limits, and responsibility for what gets published.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used: Suno AI (Advanced mode), Suno \"Write Full Song\"\r\n- AI prompts (summary): Style prompts for aggressive/dark electronic tracks; lyric prompts remixed with Frankenstein vocabulary and quotations\r\n- What AI generated: Music tracks, vocal performance, and lyric drafts/expansions\r\n- What you changed or decided: Wrote initial lyric material, selected final outputs, edited/recycled prompts, and applied quality criteria for acceptance\r\n- Sources consulted: https://en.wikiquote.org/wiki/Frankenstein_(novel), https://www.goodreads.com/work/quotes/4836639-frankenstein-or-the-modern-prometheus, https://www.litcharts.com/lit/frankenstein/characters, https://mhsliterature.weebly.com/uploads/3/0/3/9/3039381/frankensteinvocabularylistanddefinitions.pdf\r\n","makes/week10.md":"# Make 9. Games and Play\r\n\r\n## The Artifact\r\n\u003ciframe src=\"ink-game.html\" width=\"940\" height=\"620\" frameborder=\"0\" title=\"Ink Game interactive artifact\" loading=\"lazy\"\u003e\u003c/iframe\u003e\r\n\r\n[Open Ink Game in a new tab](ink-game.html)\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week11.md":"# Week 11 â€“ AI \u0026 Labor\r\n\r\n## The Artifact\r\nDescribe or embed your artifact here.\r\nInclude images, links, or media as appropriate.\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week12.md":"# Week 12 â€“ AI \u0026 Ecology\r\n\r\n## The Artifact\r\nDescribe or embed your artifact here.\r\nInclude images, links, or media as appropriate.\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","makes/week13.md":"# Week 13 â€“ Futures of AI \u0026 Humanity\r\n\r\n## The Artifact\r\nDescribe or embed your artifact here.\r\nInclude images, links, or media as appropriate.\r\n\r\n## Process Notes\r\nHow did you make this?\r\nWhat tools did you use?\r\nWhat decisions did you make?\r\n\r\n## Reflection\r\nRespond to this weekâ€™s reflection prompt in 200â€“300 words.\r\n\r\n## Attribution \u0026 AI Use\r\n- Tools used:\r\n- AI prompts (summary):\r\n- What AI generated:\r\n- What you changed or decided:\r\n","pages/about.md":"# About Me\r\n\r\nIntroduce yourself and your interests.","pages/accessibility.md":"# Accessibility\r\n\r\nExplain how you considered accessibility in your work.","pages/how-i-use-ai.md":"# How I Use AI\r\n\r\n\u003ciframe src=\"assets/pdfs/how-i-use-ai.pdf\" width=\"940\" height=\"620\" frameborder=\"0\" title=\"How I Use AI PDF\" loading=\"lazy\"\u003e\u003c/iframe\u003e\r\n\r\n[Open the PDF in a new tab](assets/pdfs/how-i-use-ai.pdf)","pages/markdown-guide.md":"# Markdown Guide\r\n\r\nQuick reference for writing course pages and reflections.\r\n\r\n## Headings\r\nUse `#` for titles and smaller headings.\r\n\r\n```markdown\r\n# Page Title\r\n## Section\r\n### Subsection\r\n```\r\n\r\n## Paragraphs and Line Breaks\r\nBlank lines separate paragraphs. End a line with two spaces for a soft break.\r\n\r\n```markdown\r\nFirst line with a soft break.  \r\nSecond line in the same paragraph.\r\n```\r\n\r\n## Emphasis\r\n\r\n```markdown\r\n*italic* or _italic_\r\n**bold**\r\n***bold italic***\r\n```\r\n\r\n## Lists\r\nUnordered, ordered, and task lists.\r\n\r\n```markdown\r\n- bullet item\r\n- another item\r\n\r\n1. first\r\n2. second\r\n\r\n- [x] done\r\n- [ ] to do\r\n```\r\n\r\n## Links and Images\r\nUse relative paths inside the repo.\r\n\r\n```markdown\r\n[Week 01 reflection](../reflections/week01.md)\r\n[Outside resource](https://example.com)\r\n![Alt text for image](../assets/images/example.png)\r\n```\r\n\r\n### Embedding local images\r\n- Put images in assets/images.\r\n- From reflections/ or pages/ folders, link with `../assets/images/filename.ext`.\r\n- Write helpful alt text that describes the image.\r\n\r\n```markdown\r\n![Alt text: campus map sketch](../assets/images/campus-sketch.png)\r\n```\r\n\r\n## Code and Quotes\r\n\r\n```markdown\r\nInline `code` in a sentence.\r\n\r\n```\r\ncode fence for multiple lines\r\n```\r\n\r\n\u003e Blockquotes are great for citing sources.\r\n```\r\n\r\n## Tables\r\n\r\n```markdown\r\n| Item | Detail |\r\n| --- | --- |\r\n| Row 1 | Text |\r\n| Row 2 | More text |\r\n```\r\n\r\n## Horizontal Rules and Escaping\r\n\r\n```markdown\r\n---\r\n\\*Escape characters\\* so they render literally.\r\n```\r\n\r\n## Footnotes (optional)\r\n\r\n```markdown\r\nHere is a footnote.[^1]\r\n\r\n[^1]: Footnote text goes here.\r\n```\r\n\r\n## Course Tips\r\n- Keep filenames lowercase with hyphens (no spaces).\r\n- Place images in assets/images and link with ../assets/images/filename.png from pages/.\r\n- Preview markdown in VS Code (built-in) before submitting.\r\n- Keep headings in order (do not jump from # to ### directly).\r\n- Use descriptive alt text for images (what someone would miss if the image did not load).\r\n- When copying from Word/Google Docs, paste as plain text to avoid odd characters.\r\n\r\n## Weekly Reflection Template\r\n\r\nUse this structure for weekly reflections (adjust prompts as needed).\r\n\r\n```markdown\r\n# Week 13 Reflection\r\n\r\n## Prompt 1: Key insight\r\nWrite 3-5 sentences answering the question. Focus on what surprised you or changed your view.\r\n\r\n## Prompt 2: Example or evidence\r\n- Briefly describe an artifact, reading, or class activity.\r\n- Explain how it supports or challenges your thinking.\r\n\r\n## Prompt 3: Next steps\r\n1. What will you try next week?\r\n2. What do you still need to learn or clarify?\r\n\r\n## Media (optional)\r\n![Alt text: short description](../assets/images/example.png)\r\n```\r\n\r\nTips for reflections\r\n- Start with a clear H1 title: `# Week X Reflection`.\r\n- Keep sections in order; avoid skipping heading levels.\r\n- Prefer short paragraphs and bullet points over long blocks of text.\r\n- If you include images, explain why they matter in the surrounding text.\r\n","pages/sustainability.md":"# Sustainability \u0026 Ethics\r\n\r\nSource PDF: assets/pdfs/Sustainability \u0026 Ethics - Google Docs.pdf\r\n\r\n## 1. My Research (Brief Summary)\r\n\r\nResearching AI energy and carbon costs proved difficult, as many articles recycle unverified numbers without solid sourcing.\r\n\r\nTen sources were used, primarily academic, nonprofit, and governmental, including a May 2025 paper from a University of Rhode Island, University of Tunis, and Providence College research group.\r\n\r\nThe hardest data to pin down was per-prompt watt and carbon usage, since AI companies tend to underreport their figures compared to independent studies. Even the data ultimately used carried notable uncertainty, with some standard deviations as high as 3.663.\r\n\r\n## 2. Data Sources (Cited)\r\n\r\n- Carbon Footprint Ltd. Carbonfootprint.Com. Energy Data Guide: From Home Appliances to Enterprise Net Zero. Accessed April 22, 2026. https://www.carbonfootprint.com/energyconsumption.html\r\n- Cho, Renee. AI's Growing Carbon Footprint. State of the Planet, June 9, 2023. https://news.climate.columbia.edu/2023/06/09/ais-growing-carbon-footprint/\r\n- co2everything. Categories of CO2 Emissions. CO2 Everything. Accessed April 22, 2026. https://www.co2everything.com/categories\r\n- Elsworth, Cooper, Keguo Huang, David Patterson, et al. Measuring the Environmental Impact of Delivering AI at Google Scale. arXiv, August 21, 2025. https://arxiv.org/abs/2508.15734\r\n- McLean, Sophie. The Environmental Impact of ChatGPT. Earth.Org, April 28, 2023. https://earth.org/environmental-impact-chatgpt/\r\n- MIT News, and Adam Zewe. Explained: Generative AI's Environmental Impact. MIT News, January 17, 2025. https://news.mit.edu/2025/explained-generative-ai-environmental-impact-0117\r\n- Nidhal Jegham et al. How Hungry is AI? Benchmarking Energy, Water, and Carbon Footprint of LLM Inference. arXiv preprint, submitted May 14, 2025. https://arxiv.org/abs/2505.09598\r\n- NRDC (the Natural Resources Defense Council). Latest Game Consoles: Environmental Winners or Losers? January 13, 2021. https://www.nrdc.org/bio/noah-horowitz/latest-game-consoles-environmental-winners-or-losers\r\n- PSEG Long Island. Energy Guide. Accessed April 22, 2026. https://www.psegliny.com/saveenergyandmoney/tipsandtools/energyguide\r\n- U.S. Energy Information Administration. Frequently Asked Questions (FAQs). December 11, 2024. https://www.eia.gov/tools/faqs/faq.php?id=74\u0026t=11\r\n- Vahdat, Amin, and Jeff Dean. Measuring the Environmental Impact of AI Inference. Google Cloud, August 21, 2025. https://cloud.google.com/blog/products/infrastructure/measuring-the-environmental-impact-of-ai-inference/\r\n\r\n## 3. Personal Reflection\r\n\r\n### My AI Use Habits\r\n\r\nOutside of my Digital Humanities class, I use AI regularly as an extra tutor. When I do not understand part of an academic assignment, working through questions with AI can be easier than consulting a professor or tutor late at night. I also consult AI to search for reliable sources that I might not find through regular Google or academic database searches, though this often yields mixed results.\r\n\r\n### Estimated Impact\r\n\r\nTo estimate my impact, I will use my Make 11 work and a Gemini and ChatGPT estimation. Based on around 506 conversations with an average of 600 characters per conversation, my impact value is still being finalized in the source draft.\r\n\r\n### What I Am Willing to Change\r\n\r\nI definitely do not need AI to search for better sources in many cases. Often, spending more time researching yields the same results. Improving my semester schedule so that less work happens late at night will also reduce how often I rely on AI for assistance.\r\n\r\n### What I Cannot or Will Not Change (and Why)\r\n\r\nAlthough I can try, my schedule will probably not change significantly for some time. I tend to complete each item to the best of my ability as a perfectionist. Still, reviewing material more thoroughly may save a few AI inquiries.\r\n\r\n## 4. Systemic vs. Individual Responsibility\r\n\r\n### What Can Individuals Do?\r\n\r\nThere are several ways individuals can reduce the environmental impact of AI use:\r\n\r\n- Make sure AI is necessary for the task and cannot be done more simply.\r\n- Keep prompts concise and avoid filler language.\r\n- Remember that individual behavior matters and follow through on better practices.\r\n\r\n### What Requires Systemic Change?\r\n\r\nThere needs to be more real green energy, greater emphasis on efficiency-first AI modeling, and stronger data-center regulation to protect natural resources. Public understanding of AI environmental impacts also needs to improve, which requires better communication and transparency.\r\n\r\n### Who Is Responsible?\r\n\r\nWhile each person has some responsibility, AI companies, governments, and AI programmers hold major responsibility because their decisions have the broadest impact.","reflections/week01.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n# Week 1 Reflection\r\n\r\nReflect 1: What counts as â€œmakingâ€ in the age of AI? What might be gained/lost when machines participate in making?\r\n","reflections/week02.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 2 Reflection\r\n\r\nReflect 2: Can AI help us define what it means to be human, or does it reduce us to patterns?\r\n","reflections/week03.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n# Week 3 Reflection\r\n\r\nReflect 3: What does â€œauthenticityâ€ mean when identity is co-constructed with AI?\r\n","reflections/week04.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 4 Reflection\r\n\r\nReflect 4: Is AI a collaborator, tool, or plagiarist in storytelling?","reflections/week05.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 5 Reflection\r\n\r\nReflect 5: How does AI alter authorship and remix culture? Who owns AI-made art?\r\n","reflections/week06.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 6 Reflection\r\n\r\nReflect 6: What do we gain/lose when machines â€œreadâ€ literature for us?","reflections/week07.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 7 Reflection\r\n\r\nReflect 7: How does AI reshape global geographies of power, labor, and environment?\r\n","reflections/week08.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 8 Reflection\r\n\r\nReflect 8: Who is visible/invisible in AI networks? How does visualization reveal or obscure power?","reflections/week09.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 9 Reflection\r\n\r\nReflect 9: What is creativity when AI can generate endlessly? Where is the human in generative work?","reflections/week10.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 10 Reflection\r\n\r\nReflect 10: How does AI change our relationship to play, rules, and narrative?","reflections/week11.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 11 Reflection\r\n\r\nReflect 11: Who does the invisible work of AI, and who profits from it?","reflections/week12.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 12 Reflection\r\n\r\nReflect 12: Is AI sustainable? What ecological trade-offs are we willing to accept?","reflections/week13.md":"\u003e **Markdown help:** See [markdown-guide.md](../pages/markdown-guide.md) for formatting tips and a reflection template.\r\n\r\n# Week 13 Reflection\r\n\r\nReflect 13: Do we imagine AI futures as utopian, dystopian, or something in between? What do those visions reveal about us?"};

        function getDocPath() {
            const params = new URLSearchParams(window.location.search);
            return params.get('doc');
        }

        function safePath(path) {
            if (!path) return null;
            if (path.includes('..') || path.startsWith('/') || path.startsWith('http')) return null;
            const allowed = /^(pages|makes|reflections)\/[\w\-\/]+\.(md|html)$/i;
            return allowed.test(path) ? path : null;
        }

        function escapeHtml(input) {
            return input
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function inlineMarkdown(text) {
            return text
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        }

        function renderMarkdownBasic(markdown) {
            const lines = markdown.replace(/\r\n/g, '\n').split('\n');
            let html = '';
            let inCode = false;
            let inList = false;

            for (const line of lines) {
                if (line.startsWith('```')) {
                    if (!inCode) {
                        html += '<pre><code>';
                        inCode = true;
                    } else {
                        html += '</code></pre>';
                        inCode = false;
                    }
                    continue;
                }

                if (inCode) {
                    html += `${escapeHtml(line)}\n`;
                    continue;
                }

                if (!line.trim()) {
                    if (inList) {
                        html += '</ul>';
                        inList = false;
                    }
                    continue;
                }

                const trimmed = line.trim();
                const isAllowedRawHtml = /^(<iframe\b[\s\S]*<\/iframe>|<img\b[^>]*>|<div\b[^>]*>[\s\S]*<\/div>|<div\b[^>]*>|<\/div>|<p\b[^>]*>[\s\S]*<\/p>|<p\b[^>]*>|<\/p>|<\/?figure\b[^>]*>|<\/?figcaption\b[^>]*>)$/i.test(trimmed);
                if (isAllowedRawHtml) {
                    if (inList) {
                        html += '</ul>';
                        inList = false;
                    }
                    html += trimmed;
                    continue;
                }

                const heading = line.match(/^(#{1,4})\s+(.*)$/);
                if (heading) {
                    if (inList) {
                        html += '</ul>';
                        inList = false;
                    }
                    const level = heading[1].length;
                    html += `<h${level}>${inlineMarkdown(escapeHtml(heading[2]))}</h${level}>`;
                    continue;
                }

                const listItem = line.match(/^[-*]\s+(.*)$/);
                if (listItem) {
                    if (!inList) {
                        html += '<ul>';
                        inList = true;
                    }
                    html += `<li>${inlineMarkdown(escapeHtml(listItem[1]))}</li>`;
                    continue;
                }

                if (inList) {
                    html += '</ul>';
                    inList = false;
                }

                html += `<p>${inlineMarkdown(escapeHtml(line))}</p>`;
            }

            if (inList) html += '</ul>';
            if (inCode) html += '</code></pre>';

            return html;
        }

        function loadDoc() {
            const raw = getDocPath();
            const path = safePath(raw);
            const titleNode = document.getElementById('docTitle');
            const contentNode = document.getElementById('docContent');

            if (!path) {
                titleNode.textContent = 'Invalid Document Request';
                contentNode.innerHTML = '<p class="msg">The requested document could not be loaded.</p>';
                return;
            }

            titleNode.textContent = path;

            const text = DOCS[path];
            if (typeof text !== 'string') {
                contentNode.innerHTML = '<p class="msg">Document not found in viewer map.</p>';
                return;
            }

            if (/\.md$/i.test(path)) {
                contentNode.innerHTML = renderMarkdownBasic(text);
            } else {
                const doc = new DOMParser().parseFromString(text, 'text/html');
                const htmlBody = doc.body ? doc.body.innerHTML.trim() : '';
                contentNode.innerHTML = htmlBody || '<p class="msg">This HTML document has no readable body content.</p>';
            }
        }

        loadDoc();
    </script>
